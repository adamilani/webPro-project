<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="home-page-style.css">
    <title>FIFA World Cup 2026</title>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>FIFA WORLD CUP 2026</h1>
            <p>United 2026: USA | CANADA | MEXICO</p>
        </div>
    </header>

    <nav>
        <a href="#">Match Schedule</a>
        <a href="#">Host Cities</a>
        <a href="#">Tickets</a>
    </nav>

    <div id="countdown-container">
        <p>Kickoff In: <span id="days-count">--</span> Days</p>
    </div>

    <div id="sort-options">
        <label>
            Filter Tickets:
            <select id="sort-select">
                <option value="name">By Venue</option>
                <option value="category">By Phase</option>
                <option value="price">By Price</option>
            </select>
        </label>
    </div>

    <section>
        <h2>Official Ticket Packages</h2>
        <div id="data-container" class="card-container">
            </div>
    </section>

    <div id="cart">
        <button id="cart-button">View My Tickets</button>
    </div>

    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="product-details" class="product-details-container"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 FIFA World Cup - All Rights Reserved</p>
    </footer>

    <script src="home-page-script.js"></script>
</body>
</html>
