<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="sign-in-up-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <title>FIFA Fan ID Portal</title>
</head>
<body>
    <div class="container" id="container">
        <div class="form-container sign-up">
            <form name="details" onsubmit="singUp(event)">
                <h1>Create Fan ID</h1>
                <div class="social-icons">
                    <a href="#" class="icon"><i class="fa-brands fa-google"></i></a>
                    <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
                </div>
                <span>or register with your email</span>
                <input type="text" placeholder="Full Name" name="userName">
                <input type="email" placeholder="Email" name="userEmail">
                <input type="password" placeholder="Password" name="userPassword">
                <button type="submit">Join the Fans</button>
            </form>
        </div>

        <div class="form-container sign-in">
            <form id="loginForm" onsubmit="signIn(event)">
                <h1>Fan Sign In</h1>
                <div class="social-icons">
                    <a href="#" class="icon"><i class="fa-brands fa-google"></i></a>
                    <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
                </div>
                <span>use your Fan ID credentials</span>
                <input type="email" placeholder="Email" name="userEmail">
                <input type="password" placeholder="Password" name="userPassword">
                <a href="#">Forgot Password?</a> 
                <button type="submit">Kick Off</button>
            </form>
        </div>

        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                    <h1>Ready to Play?</h1>
                    <p>Log in with your Fan ID to access match tickets and schedules</p>
                    <button class="hidden" id="login">Sign In</button>
                </div>
                <div class="toggle-panel toggle-right">
                    <h1>Hello, Fan!</h1>
                    <p>Register now to get exclusive access to World Cup 2026 tickets</p>
                    <button class="hidden" id="register">Create ID</button>
                </div>
            </div>
        </div>
    </div>
    <script src="sign-in-up-script.js"></script>
</body>
</html>
