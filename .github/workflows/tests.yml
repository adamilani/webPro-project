name: CI-Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          # הסרנו את שורות ה-cache כדי למנוע את השגיאה

      - name: Install dependencies
        run: |
          # אם התיקייה client נמצאת ישר בשורש הריפו, השתמש בזה:
          cd webPro-main/client || cd client
          npm install

      - name: Run Puppeteer tests
        run: |
          cd webPro-main/client || cd client
          npm test