name: CI-Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          # הסרנו את ה-cache לחלוטין כדי למנוע את השגיאה האדומה שקיבלת

      - name: Install dependencies
        run: |
          # פקודה חכמה שמוצאת איפה נמצא ה-package.json של ה-client ונכנסת לשם
          TARGET_DIR=$(find . -name "package.json" -path "*/client/*" -exec dirname {} \;)
          echo "Moving to $TARGET_DIR"
          cd "$TARGET_DIR"
          npm install

      - name: Run Puppeteer tests
        run: |
          TARGET_DIR=$(find . -name "package.json" -path "*/client/*" -exec dirname {} \;)
          cd "$TARGET_DIR"
          npm test