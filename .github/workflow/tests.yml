name: CI-Tests
on: [push, pull_request]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install and Test
        run: |
          # מחפש את התיקייה שבה נמצא ה-package.json של הקליינט ומריץ שם הכל
          cd $(find . -name "package.json" -path "*/client/*" -exec dirname {} \;)
          npm install
          npm test